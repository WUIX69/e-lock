persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# MQTT listener — requires authentication
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# WebSocket listener — requires authentication
listener 9001
protocol websockets
allow_anonymous false
password_file /mosquitto/config/passwd
